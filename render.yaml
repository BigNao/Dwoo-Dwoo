services:
  - type: web
    name: kwansodwoo-server
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_ADMIN_SDK_KEY
        sync: false
